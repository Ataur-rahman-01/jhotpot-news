name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'bd-news-backend/api/**'
      - 'bd-news-backend/requirements.txt'
      - 'bd-news-backend/Dockerfile'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  REPOSITORY: bd-news
  IMAGE: api
  SERVICE: bd-news-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: bd-news-backend
        run: |
          IMAGE_URL=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          docker build -f Dockerfile \
            -t $IMAGE_URL:${{ github.sha }} \
            -t $IMAGE_URL:latest \
            .
          docker push $IMAGE_URL:${{ github.sha }}
          docker push $IMAGE_URL:latest

      - name: Deploy to Cloud Run
        run: |
          IMAGE_URL=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}

          gcloud run deploy ${{ env.SERVICE }} \
            --image=$IMAGE_URL \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-secrets="MONGO_URI=MONGO_URI:latest,FIREBASE_CREDENTIALS=FIREBASE_CREDENTIALS:latest,B2_KEY_ID=B2_KEY_ID:latest,B2_APP_KEY=B2_APP_KEY:latest,B2_BUCKET_NAME=B2_BUCKET_NAME:latest,B2_ENDPOINT=B2_ENDPOINT:latest" \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --port=8080 \
            --quiet

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)"
